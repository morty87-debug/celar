<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cellar — Min vinkällare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/druvor.css">
  <style>
    .kallare-controls {
      max-width: 660px;
      margin: 1.5rem auto;
      padding: 0 1.5rem;
      position: relative;
      z-index: 1;
    }
    .add-wine-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      padding: 0.85rem;
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      color: #fff;
      background: var(--wine);
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.3s;
    }
    .add-wine-btn:hover { background: var(--wine-light); }
    .kallare-stats {
      display: flex;
      gap: 0.75rem;
      margin-top: 1rem;
    }
    .stat-card {
      flex: 1;
      text-align: center;
      padding: 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }
    .stat-num {
      font-family: var(--font-display);
      font-size: 1.5rem;
      color: var(--sand-light);
    }
    .stat-label {
      font-size: 0.7rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .kallare-list {
      max-width: 660px;
      margin: 1.5rem auto;
      padding: 0 1.5rem 4rem;
      position: relative;
      z-index: 1;
    }
    .wine-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      margin-bottom: 0.5rem;
      transition: all 0.3s;
      animation: fadeUp 0.4s ease-out backwards;
    }
    .wine-item:hover {
      border-color: var(--border-hover);
      background: var(--surface-hover);
    }
    .wine-color {
      width: 12px;
      height: 40px;
      border-radius: 6px;
      flex-shrink: 0;
    }
    .wine-color.rod { background: linear-gradient(180deg, #6b1e2e, #8c2f42); }
    .wine-color.vit { background: linear-gradient(180deg, #d4c87a, #e8dca0); }
    .wine-color.rose { background: linear-gradient(180deg, #d4a0a0, #e8c0b0); }
    .wine-color.mousserande { background: linear-gradient(180deg, #c8d4a0, #e0e8c0); }
    .wine-info { flex: 1; }
    .wine-name {
      font-family: var(--font-display);
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--sand-light);
    }
    .wine-details {
      font-size: 0.78rem;
      color: var(--text-muted);
    }
    .wine-grape {
      font-size: 0.7rem;
      color: var(--text-dim);
      font-style: italic;
    }
    .wine-qty {
      font-family: var(--font-display);
      font-size: 1.1rem;
      color: var(--text-muted);
      min-width: 2rem;
      text-align: center;
    }
    .wine-actions {
      display: flex;
      gap: 0.3rem;
    }
    .wine-action-btn {
      font-size: 0.8rem;
      color: var(--text-dim);
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      width: 28px;
      height: 28px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .wine-action-btn:hover {
      color: var(--wine);
      border-color: var(--border-hover);
    }
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-dim);
    }
    .empty-state p { font-size: 0.9rem; margin-top: 0.5rem; }

    /* Form modal */
    .form-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .form-overlay.open { display: flex; }
    .form-modal {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      max-width: 460px;
      width: 100%;
      padding: 2rem;
      animation: fadeUp 0.3s ease-out;
    }
    .form-title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      color: var(--sand-light);
      margin-bottom: 1.25rem;
    }
    .form-group {
      margin-bottom: 0.85rem;
    }
    .form-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.3rem;
    }
    .form-input, .form-select {
      font-family: var(--font-body);
      font-size: 0.88rem;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.55rem 0.75rem;
      width: 100%;
      outline: none;
      transition: border-color 0.3s;
    }
    .form-input:focus, .form-select:focus { border-color: var(--border-hover); }
    .form-row { display: flex; gap: 0.75rem; }
    .form-row .form-group { flex: 1; }
    .form-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 1.25rem;
    }
    .form-actions button {
      flex: 1;
      padding: 0.65rem;
      font-family: var(--font-body);
      font-size: 0.85rem;
      font-weight: 500;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-cancel {
      color: var(--text-muted);
      background: transparent;
      border: 1px solid var(--border);
    }
    .btn-cancel:hover { border-color: var(--border-hover); }
    .btn-save {
      color: #fff;
      background: var(--wine);
      border: none;
    }
    .btn-save:hover { background: var(--wine-light); }
    .match-section {
      max-width: 660px;
      margin: 0 auto;
      padding: 0 1.5rem 1rem;
      position: relative;
      z-index: 1;
    }
    .match-input-row {
      display: flex;
      gap: 0.5rem;
    }
    .match-input {
      flex: 1;
      font-family: var(--font-body);
      font-size: 0.88rem;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.6rem 0.85rem;
      outline: none;
    }
    .match-input:focus { border-color: var(--border-hover); }
    .match-input::placeholder { color: var(--text-dim); }
    .match-btn {
      padding: 0.6rem 1.2rem;
      font-family: var(--font-display);
      font-size: 0.9rem;
      color: #fff;
      background: var(--earth);
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.3s;
      white-space: nowrap;
    }
    .match-btn:hover { background: var(--earth-light); }
    .match-results {
      max-width: 660px;
      margin: 0.75rem auto;
      padding: 0 1.5rem;
      position: relative;
      z-index: 1;
    }
    .match-result-card {
      padding: 1rem 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--moss);
      border-radius: var(--radius-sm);
      margin-bottom: 0.5rem;
      animation: fadeUp 0.4s ease-out backwards;
    }
    .match-result-card h4 {
      font-family: var(--font-display);
      font-size: 1rem;
      color: var(--sand-light);
      margin-bottom: 0.3rem;
    }
    .match-result-card p {
      font-size: 0.82rem;
      color: var(--text-muted);
      line-height: 1.6;
    }
  </style>
  <link rel="stylesheet" href="css/mobile.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#8B1A2B">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
  <div class="bg-grain"></div>

  <header class="druvor-header">
    <a href="index.html" class="back-link"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>Tillbaka</a>
    <h1 class="druvor-title">Min vinkällare</h1>
    <p class="druvor-subtitle">Hantera dina viner och få matchningar</p>
  </header>

  <div class="kallare-controls">
    <button class="add-wine-btn" onclick="openForm()">+ Lägg till vin manuellt</button>
    <button class="add-wine-btn" style="background:var(--wine-deep);margin-top:0.5rem;" onclick="openPhotoAdd()">📷 Fota och lägg till</button>
    <button class="add-wine-btn" style="background:var(--earth);margin-top:0.5rem;" onclick="exportCellar()">Exportera vinkällare</button>
    <div class="kallare-stats" id="stats"></div>
  </div>

  <div class="match-section">
    <div class="continent-header" style="margin-top:1rem">
      <span class="continent-line"></span>
      <span class="continent-name">Matcha mot en rätt</span>
      <span class="continent-line"></span>
    </div>
    <div class="match-input-row">
      <input type="text" class="match-input" id="matchInput" placeholder="Skriv en rätt... t.ex. 'grillad lax med dill'">
      <button class="match-btn" onclick="matchWines()">Matcha</button>
    </div>
  </div>
  <div class="match-results" id="matchResults"></div>

  <div class="kallare-list" id="wineList"></div>

  <div class="form-overlay" id="formOverlay">
    <div class="form-modal">
      <h2 class="form-title">Lägg till vin</h2>
      <div class="form-group">
        <label class="form-label">Vinnamn</label>
        <input type="text" class="form-input" id="fNamn" placeholder="t.ex. Château Margaux">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Producent</label>
          <input type="text" class="form-input" id="fProducent" placeholder="t.ex. Domaine XYZ">
        </div>
        <div class="form-group">
          <label class="form-label">Årgång</label>
          <input type="number" class="form-input" id="fArgang" placeholder="2020">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Druva</label>
          <input type="text" class="form-input" id="fDruva" placeholder="t.ex. Cabernet Sauvignon" list="druvList" autocomplete="off">
          <datalist id="druvList"></datalist>
        </div>
        <div class="form-group">
          <label class="form-label">Typ</label>
          <select class="form-select" id="fTyp">
            <option value="rod">Rött</option>
            <option value="vit">Vitt</option>
            <option value="rose">Rosé</option>
            <option value="mousserande">Mousserande</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Region</label>
          <input type="text" class="form-input" id="fRegion" placeholder="t.ex. Bordeaux">
        </div>
        <div class="form-group">
          <label class="form-label">Antal flaskor</label>
          <input type="number" class="form-input" id="fAntal" value="1" min="1">
        </div>
      </div>
      <div class="form-actions">
        <button class="btn-cancel" onclick="closeForm()">Avbryt</button>
        <button class="btn-save" onclick="saveWine()">Spara</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'cellar-kallare';

    function getWines() {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    }

    function saveWines(wines) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(wines));
    }

    function render() {
      const wines = getWines();
      const list = document.getElementById('wineList');
      const stats = document.getElementById('stats');

      const total = wines.reduce((s, w) => s + (w.antal || 1), 0);
      const roda = wines.filter(w => w.typ === 'rod').reduce((s, w) => s + (w.antal || 1), 0);
      const vita = wines.filter(w => w.typ === 'vit').reduce((s, w) => s + (w.antal || 1), 0);

      stats.innerHTML = `
        <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">Flaskor</div></div>
        <div class="stat-card"><div class="stat-num">${wines.length}</div><div class="stat-label">Viner</div></div>
        <div class="stat-card"><div class="stat-num">${roda}</div><div class="stat-label">Röda</div></div>
        <div class="stat-card"><div class="stat-num">${vita}</div><div class="stat-label">Vita</div></div>
      `;

      if (wines.length === 0) {
        list.innerHTML = '<div class="empty-state"><p>Din vinkällare är tom.<br>Lägg till ditt första vin ovan.</p></div>';
        return;
      }

      list.innerHTML = '';
      wines.sort((a, b) => a.namn.localeCompare(b.namn, 'sv')).forEach((w, i) => {
        const div = document.createElement('div');
        div.className = 'wine-item';
        div.style.animationDelay = `${i * 0.03}s`;
        div.style.cursor = 'pointer';
        div.onclick = () => openWineDetail(w.id);
        div.innerHTML = `
          <div class="wine-color ${w.typ}"></div>
          <div class="wine-info">
            <div class="wine-name">${w.namn}</div>
            <div class="wine-details">${w.producent || ''} ${w.argang ? '· ' + w.argang : ''} ${w.region ? '· ' + w.region : ''}</div>
            <div class="wine-grape">${w.druva || ''}${w.klassificering ? ' · ' + w.klassificering : ''}</div>
            <div style="margin-top:0.15rem;">
              ${[1,2,3,4,5].map(s => `<span style="font-size:0.85rem;color:${s <= (w.rating||0) ? 'var(--gold-muted)' : 'var(--border)'};">★</span>`).join('')}
            </div>
          </div>
          <div style="font-size:0.85rem;color:var(--text-dim);">→</div>
        `;
        list.appendChild(div);
      });
    }

    function openForm() {
      document.getElementById('formOverlay').classList.add('open');
    }

    function closeForm() {
      document.getElementById('formOverlay').classList.remove('open');
    }

    function saveWine() {
      const namn = document.getElementById('fNamn').value.trim();
      if (!namn) return;
      const wines = getWines();
      wines.push({
        id: Date.now().toString(36),
        namn,
        producent: document.getElementById('fProducent').value.trim(),
        argang: document.getElementById('fArgang').value.trim(),
        druva: document.getElementById('fDruva').value.trim(),
        typ: document.getElementById('fTyp').value,
        region: document.getElementById('fRegion').value.trim(),
        antal: parseInt(document.getElementById('fAntal').value) || 1
      });
      saveWines(wines);
      closeForm();
      ['fNamn','fProducent','fArgang','fDruva','fRegion'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('fAntal').value = '1';
      render();
    }

    function changeQty(id, delta) {
      const wines = getWines();
      const w = wines.find(w => w.id === id);
      if (w) {
        w.antal = Math.max(0, (w.antal || 1) + delta);
        if (w.antal === 0) {
          saveWines(wines.filter(x => x.id !== id));
        } else {
          saveWines(wines);
        }
        render();
      }
    }

    function openWineDetail(id) {
      const wines = getWines();
      const w = wines.find(x => x.id === id);
      if (!w) return;

      const meterBar = (label, value, color) => {
        if (!value || value === '-') return '';
        const levels = {'låg':20,'medium':55,'hög':90,'lätt':20,'full':90,'torrt':15,'halvtorrt':35,'halvsött':60,'sött':85};
        const pct = levels[(value||'').toLowerCase()] || 50;
        return `<div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.3rem;">
          <span style="font-size:0.78rem;color:var(--text-muted);min-width:65px;">${label}</span>
          <div style="flex:1;height:6px;background:rgba(0,0,0,0.05);border-radius:3px;overflow:hidden;">
            <div style="height:100%;width:${pct}%;background:${color};border-radius:3px;"></div>
          </div>
          <span style="font-size:0.72rem;color:var(--text-dim);min-width:50px;text-align:right;">${value}</span>
        </div>`;
      };

      const overlay = document.getElementById('wineDetailOverlay');
      const content = document.getElementById('wineDetailContent');
      content.innerHTML = `
        <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:1rem;">
          <div class="wine-color ${w.typ}" style="width:16px;height:50px;border-radius:8px;flex-shrink:0;"></div>
          <div>
            <h2 style="font-family:var(--font-display);font-size:1.5rem;font-weight:400;color:var(--sand-light);line-height:1.2;">${w.namn}</h2>
            <p style="font-size:0.82rem;color:var(--text-muted);">${w.producent || ''} ${w.argang ? '· ' + w.argang : ''}</p>
          </div>
        </div>

        <div style="display:flex;flex-wrap:wrap;gap:0.3rem;margin-bottom:1rem;">
          ${w.druva ? `<span style="font-size:0.72rem;font-weight:500;color:var(--wine);background:rgba(139,26,43,0.08);padding:0.2rem 0.5rem;border-radius:100px;">${w.druva}</span>` : ''}
          ${w.region ? `<span style="font-size:0.72rem;font-weight:500;color:var(--moss);background:rgba(74,90,58,0.08);padding:0.2rem 0.5rem;border-radius:100px;">${w.region}</span>` : ''}
          ${w.klassificering && w.klassificering !== 'okänd' ? `<span style="font-size:0.72rem;font-weight:500;color:var(--earth);background:rgba(92,64,51,0.08);padding:0.2rem 0.5rem;border-radius:100px;">${w.klassificering}</span>` : ''}
          ${w.alkohol && w.alkohol !== 'okänd' ? `<span style="font-size:0.72rem;font-weight:500;color:var(--text-muted);background:rgba(0,0,0,0.04);padding:0.2rem 0.5rem;border-radius:100px;">${w.alkohol}%</span>` : ''}
          ${w.prisklass ? `<span style="font-size:0.72rem;font-weight:500;color:var(--gold-muted);background:rgba(138,109,42,0.08);padding:0.2rem 0.5rem;border-radius:100px;">${w.prisklass}</span>` : ''}
        </div>

        <div style="margin-bottom:0.75rem;" onclick="event.stopPropagation()">
          <div style="font-size:0.7rem;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:0.3rem;">Ditt betyg</div>
          ${[1,2,3,4,5].map(s => `<span onclick="rateWine('${w.id}',${s});openWineDetail('${w.id}')" style="cursor:pointer;font-size:1.3rem;color:${s <= (w.rating||0) ? 'var(--gold-muted)' : 'var(--border)'};">★</span>`).join('')}
          ${w.rating ? `<span style="font-size:0.8rem;color:var(--text-dim);margin-left:0.3rem;">${w.rating}/5</span>` : `<span style="font-size:0.75rem;color:var(--text-dim);margin-left:0.3rem;">Tryck för att betygsätta</span>`}
        </div>

        ${w.kropp || w.syra || w.tanniner || w.sotma ? `
        <div style="margin-bottom:1rem;">
          <div style="font-size:0.7rem;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:0.4rem;">Karaktär</div>
          ${meterBar('Kropp', w.kropp, 'var(--gold-muted)')}
          ${meterBar('Syra', w.syra, 'var(--moss)')}
          ${meterBar('Tanniner', w.tanniner, 'var(--wine)')}
          ${meterBar('Sötma', w.sotma, 'var(--earth)')}
        </div>` : ''}

        ${w.aromer ? `<div style="margin-bottom:0.75rem;"><div style="font-size:0.7rem;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:0.3rem;">Aromer</div><p style="font-size:0.85rem;color:var(--text);line-height:1.5;">${w.aromer}</p></div>` : ''}

        ${w.matforslag?.length ? `<div style="margin-bottom:0.75rem;"><div style="font-size:0.7rem;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:0.3rem;">Matförslag</div><div style="display:flex;flex-wrap:wrap;gap:0.25rem;">${w.matforslag.map(m => `<span style="font-size:0.72rem;font-weight:500;color:var(--earth);background:rgba(92,64,51,0.08);padding:0.2rem 0.5rem;border-radius:100px;">${m}</span>`).join('')}</div></div>` : ''}

        ${w.lagring || w.temperatur ? `<div style="font-size:0.82rem;color:var(--text-muted);margin-bottom:0.75rem;">${w.lagring ? '🕐 ' + w.lagring : ''} ${w.temperatur ? '&nbsp;&nbsp;🌡 ' + w.temperatur : ''}</div>` : ''}

        ${w.fakta ? `<div style="font-size:0.82rem;color:var(--text-dim);font-style:italic;border-left:3px solid var(--wine);padding-left:0.75rem;margin-bottom:1rem;line-height:1.5;">${w.fakta}</div>` : ''}

        <div style="display:flex;flex-direction:column;gap:0.5rem;margin-top:1.25rem;border-top:1px solid var(--border);padding-top:1rem;">
          <div style="display:flex;gap:0.5rem;align-items:center;">
            <span style="font-size:0.82rem;color:var(--text-muted);">Antal flaskor:</span>
            <button class="wine-action-btn" onclick="event.stopPropagation();changeQty('${w.id}',-1);openWineDetail('${w.id}')">−</button>
            <span style="font-family:var(--font-display);font-size:1.1rem;color:var(--text);min-width:2rem;text-align:center;">${w.antal || 1}</span>
            <button class="wine-action-btn" onclick="event.stopPropagation();changeQty('${w.id}',1);openWineDetail('${w.id}')">+</button>
          </div>
          <button onclick="removeWine('${w.id}');closeWineDetail()" style="width:100%;padding:0.7rem;font-family:var(--font-body);font-size:0.85rem;font-weight:500;color:#fff;background:#a33;border:none;border-radius:var(--radius-sm);cursor:pointer;transition:all 0.3s;">🍷 Druckit upp — ta bort</button>
          <button onclick="closeWineDetail()" style="width:100%;padding:0.6rem;font-family:var(--font-body);font-size:0.85rem;color:var(--text-muted);background:transparent;border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;">Stäng</button>
        </div>
      `;
      overlay.classList.add('open');
    }

    function closeWineDetail() {
      document.getElementById('wineDetailOverlay').classList.remove('open');
    }

    function removeWine(id) {
      saveWines(getWines().filter(w => w.id !== id));
      render();
    }

    function rateWine(id, rating) {
      const wines = getWines();
      const w = wines.find(w => w.id === id);
      if (w) { w.rating = rating; saveWines(wines); render(); }
    }

    const grapeFood = {
      'cabernet sauvignon': { mat: ['grillat kött', 'biff', 'lamm', 'vilt', 'hårda ostar'], stil: 'Kraftfull med höga tanniner — behöver fett och protein' },

      'syrah': { mat: ['lamm', 'grillat kött', 'kryddiga grytor', 'vilt'], stil: 'Kryddig och pepprig — perfekt till lammets kryddor' },
      'shiraz': { mat: ['bbq', 'lamm', 'grillat kött', 'charkuterier'], stil: 'Mogen frukt, rökig — BBQ-klassikern' },
      'grenache': { mat: ['tapas', 'charkuterier', 'grillad fisk', 'pizza'], stil: 'Generös frukt — flexibel till medelhavskök' },
      'garnacha': { mat: ['tapas', 'charkuterier', 'grillad fisk', 'pizza'], stil: 'Generös frukt — flexibel till medelhavskök' },
      'tempranillo': { mat: ['lamm', 'grillat kött', 'manchego', 'paella'], stil: 'Balanserad — Spaniens allround-druva' },
      'sangiovese': { mat: ['pasta med tomatsås', 'pizza', 'grillat kött', 'parmigiano'], stil: 'Hög syra matchar tomat perfekt' },
      'nebbiolo': { mat: ['tryffel', 'brässerad vilt', 'risotto', 'lagrad ost'], stil: 'Kraftfull men elegant — kräver rik mat' },
      'malbec': { mat: ['bbq', 'biff', 'grillat lamm', 'empanadas'], stil: 'Mörk frukt och mjuka tanniner — grillat kött' },
      'zinfandel': { mat: ['bbq', 'spareribs', 'pizza', 'grillad korv'], stil: 'Kryddig, mogen — BBQ och casual mat' },
      'chardonnay': { mat: ['hummer', 'kräftor', 'krämig pasta', 'kyckling i sås'], stil: 'Fyllig — matchar fett och krämighet' },
      'sauvignon blanc': { mat: ['sallad', 'getost', 'skaldjur', 'sparris', 'sushi'], stil: 'Fräsch och syradriven — grönsaker och lätt fisk' },
      'riesling': { mat: ['kryddig mat', 'thai', 'sushi', 'fläskkotlett', 'korv'], stil: 'Hög syra och ev. sötma — motverkar chili' },
      'chenin blanc': { mat: ['fläsk', 'thailändsk mat', 'skaldjur', 'fruktsallad'], stil: 'Mångsidig — torr till söt, hög syra' },
      'pinot grigio': { mat: ['lätt fisk', 'sallad', 'antipasti', 'risotto'], stil: 'Lätt och neutral — enkel mat' },
      'pinot gris': { mat: ['fläsk', 'kyckling', 'asiatisk mat', 'ostpaj'], stil: 'Fylligare än Grigio — mer textur' },
      'gewürztraminer': { mat: ['kryddig mat', 'foie gras', 'aromatiska rätter', 'munster-ost'], stil: 'Aromatisk och fyllig — exotisk mat och stark ost' },
      'viognier': { mat: ['kryddig kyckling', 'aprikosglaserad fläsk', 'thailändsk curry'], stil: 'Blommig och fyllig — aromatisk mat' },
      'grüner veltliner': { mat: ['wiener schnitzel', 'sparris', 'sushi', 'lätt fisk'], stil: 'Vitpeppar och citrus — Österrikes allrounddruva' },
      'albariño': { mat: ['skaldjur', 'sushi', 'ceviche', 'grillad fisk'], stil: 'Salt-mineralisk — havets druva' },
      'alvarinho': { mat: ['skaldjur', 'sushi', 'ceviche', 'grillad fisk'], stil: 'Salt-mineralisk — havets druva' }
    };

    let druvDb = [];
    async function loadDruvDb() {
      try {
        const res = await fetch('data/druvor.json');
        druvDb = await res.json();
      } catch(e) {}
    }
    loadDruvDb();

    function matchWines() {
      const dish = document.getElementById('matchInput').value.trim().toLowerCase();
      if (!dish) return;
      const wines = getWines();
      const results = document.getElementById('matchResults');

      const matches = [];
      wines.forEach(w => {
        const druva = (w.druva || '').toLowerCase();
        let info = grapeFood[druva];

        if (!info && druvDb.length) {
          const dbMatch = druvDb.find(d => d.namn.toLowerCase() === druva);
          if (dbMatch && dbMatch.matparning) {
            info = { mat: dbMatch.matparning.map(m => m.toLowerCase()), stil: dbMatch.stil || '' };
          }
        }

        if (info) {
          const dishWords = dish.split(/\s+/).filter(w => w.length > 3);
          const relevance = info.mat.some(m =>
            dish.includes(m.toLowerCase()) ||
            m.toLowerCase().split(' ').some(word => word.length > 3 && dish.includes(word)) ||
            dishWords.some(dw => m.toLowerCase().includes(dw))
          );
          matches.push({ wine: w, info, relevance });
        }
      });

      matches.sort((a, b) => (b.relevance ? 1 : 0) - (a.relevance ? 1 : 0));

      if (matches.length === 0) {
        results.innerHTML = '<div class="match-result-card"><h4>Inga matchningar</h4><p>Lägg till viner med druvsorter för att få matchningar. Matchningen fungerar med alla 77 druvor i databasen.</p></div>';
        return;
      }

      results.innerHTML = '';
      matches.slice(0, 5).forEach((m, i) => {
        const matList = Array.isArray(m.info.mat) ? m.info.mat.join(', ') : '';
        results.innerHTML += `
          <div class="match-result-card" style="animation-delay:${i * 0.08}s;${m.relevance ? 'border-left-color:var(--wine);' : ''}">
            <h4>${m.wine.namn} ${m.wine.argang ? '(' + m.wine.argang + ')' : ''} ${m.relevance ? '★' : ''}</h4>
            <p><strong>${m.wine.druva}</strong> — ${m.info.stil}</p>
            <p style="margin-top:0.3rem;font-size:0.75rem;color:var(--text-dim)">Passar till: ${matList}</p>
          </div>
        `;
      });
    }

    document.getElementById('formOverlay').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeForm();
    });
    document.getElementById('photoOverlay').addEventListener('click', e => {
      if (e.target === e.currentTarget) closePhotoAdd();
    });
    document.getElementById('wineDetailOverlay').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeWineDetail();
    });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeForm(); });
    document.getElementById('matchInput').addEventListener('keydown', e => { if (e.key === 'Enter') matchWines(); });

    async function loadDruvAutocomplete() {
      try {
        const res = await fetch('data/druvor.json');
        const druvor = await res.json();
        const dl = document.getElementById('druvList');
        druvor.forEach(d => {
          const opt = document.createElement('option');
          opt.value = d.namn;
          dl.appendChild(opt);
        });

        const druvInput = document.getElementById('fDruva');
        druvInput.addEventListener('change', () => {
          const match = druvor.find(d => d.namn.toLowerCase() === druvInput.value.toLowerCase());
          if (match) {
            const typSel = document.getElementById('fTyp');
            typSel.value = match.typ === 'vit' ? 'vit' : 'rod';
          }
        });
      } catch(e) {}
    }

    function exportCellar() {
      const wines = getWines();
      if (wines.length === 0) { alert('Din vinkällare är tom.'); return; }

      let csv = 'Namn,Producent,Årgång,Druva,Typ,Region,Antal\n';
      wines.forEach(w => {
        csv += `"${w.namn}","${w.producent||''}","${w.argang||''}","${w.druva||''}","${w.typ||''}","${w.region||''}","${w.antal||1}"\n`;
      });

      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = 'cellar-vinkallare.csv';
      link.click();
    }

    // ═══ PHOTO ADD ═══
    let photoOverlayOpen = false;
    function openPhotoAdd() {
      const apiKey = getPhotoApiKey();
      if (!apiKey) {
        if (confirm('Du behöver en API-nyckel för fotofunktionen. Vill du gå till inställningen?')) {
          window.location.href = 'identifiera-foto.html';
        }
        return;
      }
      document.getElementById('photoOverlay').classList.add('open');
      photoOverlayOpen = true;
    }
    function closePhotoAdd() {
      document.getElementById('photoOverlay').classList.remove('open');
      document.getElementById('photoResult').style.display = 'none';
      document.getElementById('photoUploadArea').style.display = 'block';
      photoOverlayOpen = false;
    }
    function getPhotoApiKey() {
      let key = localStorage.getItem('cellar-api-key');
      if (!key) {
        const match = document.cookie.match(/(^|;\s*)cellar-api-key=([^;]+)/);
        if (match) key = decodeURIComponent(match[2]);
      }
      return key;
    }
    function handlePhotoFile(file) {
      if (!file || !file.type.startsWith('image/')) return;
      const reader = new FileReader();
      reader.onload = async (e) => {
        const b64 = e.target.result.split(',')[1];
        document.getElementById('photoUploadArea').style.display = 'none';
        document.getElementById('photoLoading').style.display = 'block';
        try {
          const res = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'x-api-key': getPhotoApiKey(),
              'anthropic-version': '2023-06-01',
              'anthropic-dangerous-direct-browser-access': 'true'
            },
            body: JSON.stringify({
              model: 'claude-haiku-4-5', max_tokens: 1024,
              messages: [{ role: 'user', content: [
                { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: b64 } },
                { type: 'text', text: `Analysera denna vinflaska. Ge en detaljerad profil. Svara ENBART med JSON:
{
  "namn": "vinets fullständiga namn",
  "producent": "producent/vingård",
  "region": "region, land",
  "argang": "årgång eller okänd",
  "typ": "rod/vit/rose/mousserande",
  "druva": "druvsort(er)",
  "klassificering": "DOC/DOCG/AOC/etc eller okänd",
  "alkohol": "volymprocent eller okänd",
  "kropp": "lätt/medium/full",
  "syra": "låg/medium/hög",
  "tanniner": "låg/medium/hög (bara för röda)",
  "sotma": "torrt/halvtorrt/halvsött/sött",
  "aromer": "förväntade aromer baserat på druva och region",
  "matforslag": ["maträtt 1", "maträtt 2", "maträtt 3", "maträtt 4"],
  "lagring": "drick nu / 1-3 år / 3-5 år / 5-10 år / 10+ år",
  "temperatur": "serveringstemperatur i °C",
  "fakta": "kort beskrivning av vinet, regionen eller producenten",
  "prisklass": "budget/medel/premium/lyx"
}
Basera profilen på druvsorten, regionen och årgången. Om du inte kan läsa all info, gör ditt bästa utifrån vad du ser.` }
              ]}]
            })
          });
          const data = await res.json();
          const text = data.content[0].text;
          const jsonMatch = text.match(/\{[\s\S]*\}/);
          const wine = JSON.parse(jsonMatch ? jsonMatch[0] : text);

          document.getElementById('photoLoading').style.display = 'none';
          const pr = document.getElementById('photoResult');
          pr.style.display = 'block';
          const meterBar = (label, value, color) => {
            const levels = {'låg':20,'medium':55,'hög':90,'lätt':20,'full':90,'torrt':15,'halvtorrt':35,'halvsött':60,'sött':85};
            const pct = levels[(value||'').toLowerCase()] || 50;
            return `<div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.35rem;">
              <span style="font-size:0.75rem;color:var(--text-muted);min-width:60px;">${label}</span>
              <div style="flex:1;height:5px;background:rgba(0,0,0,0.05);border-radius:3px;overflow:hidden;">
                <div style="height:100%;width:${pct}%;background:${color};border-radius:3px;"></div>
              </div>
              <span style="font-size:0.7rem;color:var(--text-dim);min-width:50px;text-align:right;">${value||'-'}</span>
            </div>`;
          };

          pr.innerHTML = `
            <h3 style="font-family:var(--font-display);font-size:1.3rem;color:var(--sand-light);margin-bottom:0.25rem;">${wine.namn || 'Okänt vin'}</h3>
            <p style="font-size:0.78rem;color:var(--text-dim);margin-bottom:0.75rem;">${wine.producent || ''} ${wine.argang ? '· ' + wine.argang : ''} ${wine.region ? '· ' + wine.region : ''}</p>

            <div style="display:flex;flex-wrap:wrap;gap:0.3rem;margin-bottom:0.75rem;">
              ${wine.druva ? `<span style="font-size:0.7rem;font-weight:500;color:var(--wine);background:rgba(139,26,43,0.08);padding:0.2rem 0.5rem;border-radius:100px;">${wine.druva}</span>` : ''}
              ${wine.klassificering && wine.klassificering !== 'okänd' ? `<span style="font-size:0.7rem;font-weight:500;color:var(--moss);background:rgba(74,90,58,0.08);padding:0.2rem 0.5rem;border-radius:100px;">${wine.klassificering}</span>` : ''}
              ${wine.alkohol && wine.alkohol !== 'okänd' ? `<span style="font-size:0.7rem;font-weight:500;color:var(--earth);background:rgba(92,64,51,0.08);padding:0.2rem 0.5rem;border-radius:100px;">${wine.alkohol}%</span>` : ''}
              ${wine.prisklass ? `<span style="font-size:0.7rem;font-weight:500;color:var(--gold-muted);background:rgba(138,109,42,0.08);padding:0.2rem 0.5rem;border-radius:100px;">${wine.prisklass}</span>` : ''}
            </div>

            <div style="margin-bottom:0.75rem;">
              ${meterBar('Kropp', wine.kropp, 'var(--gold-muted)')}
              ${meterBar('Syra', wine.syra, 'var(--moss)')}
              ${wine.tanniner && wine.tanniner !== '-' ? meterBar('Tanniner', wine.tanniner, 'var(--wine)') : ''}
              ${meterBar('Sötma', wine.sotma, 'var(--earth)')}
            </div>

            ${wine.aromer ? `<p style="font-size:0.82rem;color:var(--text);margin-bottom:0.5rem;"><strong style="color:var(--wine);">Aromer:</strong> ${wine.aromer}</p>` : ''}

            ${wine.matforslag?.length ? `<div style="margin-bottom:0.5rem;"><strong style="font-size:0.75rem;color:var(--text-muted);">MATFÖRSLAG</strong><div style="display:flex;flex-wrap:wrap;gap:0.25rem;margin-top:0.25rem;">${wine.matforslag.map(m => `<span style="font-size:0.68rem;font-weight:500;color:var(--earth);background:rgba(92,64,51,0.08);padding:0.15rem 0.45rem;border-radius:100px;">${m}</span>`).join('')}</div></div>` : ''}

            <div style="display:flex;gap:0.75rem;font-size:0.78rem;color:var(--text-muted);margin-bottom:0.5rem;">
              ${wine.lagring ? `<span>🕐 ${wine.lagring}</span>` : ''}
              ${wine.temperatur ? `<span>🌡 ${wine.temperatur}</span>` : ''}
            </div>

            ${wine.fakta ? `<p style="font-size:0.8rem;color:var(--text-dim);font-style:italic;border-left:2px solid var(--wine);padding-left:0.6rem;margin-bottom:0.75rem;">${wine.fakta}</p>` : ''}

            <div style="display:flex;gap:0.5rem;margin-top:1rem;">
              <button class="btn-save" style="flex:1;" onclick="addPhotoWine(${JSON.stringify(wine).replace(/"/g,'&quot;')})">Lägg till i källaren</button>
              <button class="btn-cancel" style="flex:0.5;" onclick="closePhotoAdd()">Avbryt</button>
            </div>
          `;
        } catch(err) {
          document.getElementById('photoLoading').style.display = 'none';
          alert('Kunde inte analysera bilden: ' + err.message);
          document.getElementById('photoUploadArea').style.display = 'block';
        }
      };
      reader.readAsDataURL(file);
    }
    function addPhotoWine(wine) {
      const wines = getWines();
      wines.push({
        id: Date.now().toString(36),
        namn: wine.namn || 'Okänt vin',
        producent: wine.producent || '',
        argang: wine.argang || '',
        druva: wine.druva || '',
        typ: wine.typ === 'vit' ? 'vit' : (wine.typ === 'rose' ? 'rose' : (wine.typ === 'mousserande' ? 'mousserande' : 'rod')),
        region: wine.region || '',
        antal: 1,
        aromer: wine.aromer || '',
        matforslag: wine.matforslag || [],
        fakta: wine.fakta || '',
        klassificering: wine.klassificering || '',
        alkohol: wine.alkohol || '',
        kropp: wine.kropp || '',
        syra: wine.syra || '',
        tanniner: wine.tanniner || '',
        sotma: wine.sotma || '',
        lagring: wine.lagring || '',
        temperatur: wine.temperatur || '',
        prisklass: wine.prisklass || '',
        addedViaPhoto: true
      });
      saveWines(wines);
      closePhotoAdd();
      render();
    }

    loadDruvAutocomplete();
    render();
  </script>
  <!-- Wine detail overlay -->
  <div class="form-overlay" id="wineDetailOverlay">
    <div class="form-modal" style="max-width:500px;max-height:85vh;overflow-y:auto;">
      <div id="wineDetailContent"></div>
    </div>
  </div>

  <!-- Photo add overlay -->
  <div class="form-overlay" id="photoOverlay">
    <div class="form-modal" style="max-width:500px;">
      <h2 class="form-title">Fota vinflaska</h2>
      <div id="photoUploadArea" style="text-align:center;padding:1.5rem 0;">
        <p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:1rem;">Ta ett foto eller ladda upp en bild — AI:n identifierar vinet och lägger till det i din källare.</p>
        <div style="display:flex;gap:0.5rem;justify-content:center;">
          <input type="file" id="photoFileInput" accept="image/*" style="display:none" onchange="handlePhotoFile(this.files[0])">
          <input type="file" id="photoCameraInput" accept="image/*" capture="environment" style="display:none" onchange="handlePhotoFile(this.files[0])">
          <button class="btn-save" onclick="document.getElementById('photoCameraInput').click()">📷 Kamera</button>
          <button class="btn-cancel" onclick="document.getElementById('photoFileInput').click()">Välj bild</button>
        </div>
      </div>
      <div id="photoLoading" style="display:none;text-align:center;padding:2rem 0;">
        <div style="width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--wine);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 1rem;"></div>
        <p style="font-size:0.85rem;color:var(--text-muted);">Analyserar etiketten...</p>
      </div>
      <div id="photoResult" style="display:none;"></div>
      <button class="btn-cancel" style="width:100%;margin-top:0.75rem;" onclick="closePhotoAdd()">Stäng</button>
    </div>
  </div>

  <script src="js/mobile-nav.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
