<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cellar — Kartor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/mobile.css">
  <style>
    .kartor-header { position:relative; z-index:1; text-align:center; padding:3rem 1.5rem 1rem; animation:fadeUp 0.8s ease-out; }
    .kartor-header h1 { font-family:var(--font-display); font-size:clamp(2.5rem,6vw,3.5rem); font-weight:300; color:var(--sand-light); letter-spacing:0.1em; }
    .kartor-header p { font-family:var(--font-display); font-style:italic; font-size:1rem; color:var(--text-muted); margin-top:0.3rem; }
    .back-link { position:absolute; top:2rem; left:1.5rem; font-family:var(--font-body); font-size:0.85rem; color:var(--text-muted); text-decoration:none; }
    .tab-bar { position:sticky; top:0; z-index:10; background:rgba(248,245,240,0.9); backdrop-filter:blur(16px); border-bottom:1px solid var(--border); padding:0.6rem 0; }
    .tab-inner { display:flex; flex-wrap:wrap; gap:0.3rem; max-width:900px; margin:0 auto; padding:0.25rem 1rem; justify-content:center; }
    .tab-btn { font-family:var(--font-body); font-size:0.7rem; font-weight:500; color:var(--text-dim); padding:0.35rem 0.65rem; border-radius:100px; border:1px solid transparent; background:transparent; cursor:pointer; transition:all 0.3s; white-space:nowrap; }
    .tab-btn:hover { color:var(--text-muted); background:rgba(107,30,46,0.04); }
    .tab-btn.active { color:var(--wine); border-color:rgba(107,30,46,0.2); background:rgba(107,30,46,0.06); }
    .map-container { max-width:700px; margin:1.5rem auto; padding:0 1.5rem 4rem; position:relative; z-index:1; }
    .map-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1.5rem; text-align:center; margin-bottom:1rem; animation:fadeUp 0.5s ease-out; }
    .map-card h2 { font-family:var(--font-display); font-size:1.4rem; font-weight:400; color:var(--sand-light); margin-bottom:0.3rem; }
    .map-sub { font-size:0.8rem; color:var(--text-dim); margin-bottom:1rem; }
    .map-img { width:100%; border-radius:var(--radius-sm); border:1px solid var(--border); cursor:pointer; transition:opacity 0.4s; }
    .map-toggle { display:flex; justify-content:center; gap:0.4rem; margin-top:0.75rem; }
    .toggle-btn { font-family:var(--font-body); font-size:0.78rem; font-weight:500; padding:0.4rem 1rem; border-radius:100px; cursor:pointer; transition:all 0.3s; }
    .toggle-btn.blind { color:var(--wine); background:rgba(107,30,46,0.06); border:1px solid rgba(107,30,46,0.2); }
    .toggle-btn.facit { color:var(--moss); background:transparent; border:1px solid var(--border); }
    .toggle-btn.active.blind { background:rgba(107,30,46,0.12); }
    .toggle-btn.active.facit { color:var(--moss); background:rgba(74,90,58,0.1); border-color:rgba(74,90,58,0.25); }
    .quiz-section { margin-top:1.5rem; padding-top:1.5rem; border-top:1px solid var(--border); text-align:left; }
    .quiz-section h3 { font-family:var(--font-display); font-size:1rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.12em; margin-bottom:0.75rem; text-align:center; }
    .quiz-q { font-family:var(--font-display); font-size:1.15rem; color:var(--sand-light); margin-bottom:1rem; text-align:center; }
    .quiz-opts { display:flex; flex-direction:column; gap:0.4rem; }
    .quiz-opt { font-family:var(--font-body); font-size:0.85rem; color:var(--text); background:var(--bg); border:1px solid var(--border); border-radius:var(--radius-sm); padding:0.7rem 0.85rem; cursor:pointer; transition:all 0.25s; text-align:left; }
    .quiz-opt:hover:not(:disabled) { border-color:var(--border-hover); background:var(--surface-hover); }
    .quiz-opt.correct { border-color:var(--moss); background:rgba(74,90,58,0.08); color:var(--moss); font-weight:500; }
    .quiz-opt.wrong { border-color:#c44; background:rgba(200,60,60,0.05); color:#a33; }
    .quiz-opt:disabled { cursor:default; }
    .quiz-feedback { margin-top:0.75rem; font-size:0.82rem; color:var(--text-muted); line-height:1.6; text-align:center; }
    .quiz-next-btn { display:none; margin:1rem auto 0; padding:0.55rem 1.5rem; font-family:var(--font-display); font-size:0.9rem; color:#fff; background:var(--wine); border:none; border-radius:var(--radius-sm); cursor:pointer; }
    .quiz-next-btn.show { display:block; }
    .quiz-score { display:flex; justify-content:center; gap:1.5rem; margin-bottom:1rem; }
    .score-num { font-family:var(--font-display); font-size:1.5rem; color:var(--sand-light); }
    .score-label { font-size:0.65rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.1em; }
  </style>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6b1e2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
  <div class="bg-grain"></div>
  <header class="kartor-header">
    <a href="index.html" class="back-link" style="font-family:var(--font-body);font-size:0.85rem;color:var(--wine);text-decoration:none;position:absolute;top:2rem;left:1.5rem;transition:opacity 0.3s;opacity:0.7;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.7'">← Tillbaka</a>
    <h1>Kartor</h1>
    <p>Blindkartor, facit och regionquiz</p>
  </header>
  <nav class="tab-bar"><div class="tab-inner" id="tabs"></div></nav>
  <main class="map-container" id="mapContainer"></main>
  <footer class="footer" style="position:relative;z-index:1;">
    <div class="footer-divider"><span class="divider-vine">✦</span></div>
    <p style="font-family:var(--font-display);font-size:0.85rem;color:var(--text-dim);letter-spacing:0.1em;">Cellar — Byggt för sommelierer</p>
  </footer>
  <script src="js/mobile-nav.js"></script>
  <script>
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    const maps = [
      { id:'frankrike', namn:'Frankrike', blind:'images/kartor/frankrike-blind.svg',facit:'images/kartor/frankrike-facit.svg', quiz:[{q:'Vilken region ligger längst norrut?',correct:'Champagne',wrong:['Bordeaux','Provence','Languedoc']},{q:'Vilken region är känd för Pinot Noir och Chardonnay?',correct:'Bourgogne',wrong:['Loire','Alsace','Rhône']},{q:'Var produceras mest rosévin?',correct:'Provence',wrong:['Bordeaux','Champagne','Languedoc']}]},
      { id:'italien', namn:'Italien', blind:'images/kartor/italien-blind.svg',facit:'images/kartor/italien-facit.svg', quiz:[{q:'I vilken region produceras Barolo?',correct:'Piemonte',wrong:['Toscana','Veneto','Sicilien']},{q:'Var tillverkas Amarone?',correct:'Veneto',wrong:['Piemonte','Umbrien','Kampanien']},{q:'Vilken ö har vulkanen Etna?',correct:'Sicilien',wrong:['Sardinien','Korsika','Capri']}]},
      { id:'spanien', namn:'Spanien', blind:'images/kartor/spanien-blind.svg',facit:'images/kartor/spanien-facit.svg', quiz:[{q:'Var ligger Priorat?',correct:'Katalonien',wrong:['Andalusien','Galicien','Kastilien']},{q:'Vilken region är känd för Sherry?',correct:'Jerez (Andalusien)',wrong:['Rioja','Ribera del Duero','Penedès']},{q:'Var odlas Albariño?',correct:'Rías Baixas',wrong:['Rioja','La Mancha','Navarra']}]},
      { id:'portugal', namn:'Portugal', blind:'images/kartor/portugal-blind.svg',facit:'images/kartor/portugal-facit.svg', quiz:[{q:'Var produceras portvin?',correct:'Douro',wrong:['Alentejo','Vinho Verde','Dão']},{q:'Vilken region är känd för Alvarinho?',correct:'Vinho Verde',wrong:['Douro','Bairrada','Algarve']}]},
      { id:'tyskland', namn:'Tyskland', blind:'images/kartor/tyskland-blind.svg',facit:'images/kartor/tyskland-facit.svg', quiz:[{q:'Vilken region har brantaste skiffersluttningarna?',correct:'Mosel',wrong:['Pfalz','Baden','Franken']},{q:'Vilken är Tysklands varmaste vinregion?',correct:'Baden',wrong:['Mosel','Rheingau','Nahe']}]},
      { id:'oesterrike', namn:'Österrike', blind:'images/kartor/oesterrike-blind.svg',facit:'images/kartor/oesterrike-facit.svg', quiz:[{q:'Var ligger Wachau?',correct:'Niederösterreich',wrong:['Burgenland','Steiermark','Wien']},{q:'Vilken region är bäst för röda viner?',correct:'Burgenland',wrong:['Steiermark','Wien','Niederösterreich']}]},
      { id:'bordeaux', namn:'Bordeaux', blind:'images/kartor/bordeaux-blind.svg',facit:'images/kartor/bordeaux-facit.svg', quiz:[{q:'Vilken druva dominerar vänstra stranden?',correct:'Cabernet Sauvignon',wrong:['Merlot','Cabernet Franc','Petit Verdot']},{q:'Var ligger Pomerol?',correct:'Höger strand',wrong:['Vänster strand','Entre-Deux-Mers','Graves']}]},
      { id:'bourgogne', namn:'Bourgogne', blind:'images/kartor/bourgogne-blind.svg',facit:'images/kartor/bourgogne-facit.svg', quiz:[{q:'Var produceras Chablis?',correct:'Nordligaste Bourgogne',wrong:['Côte de Nuits','Beaujolais','Mâconnais']},{q:'Vilken del är känd för Pinot Noir?',correct:'Côte de Nuits',wrong:['Mâconnais','Chablis','Côte Chalonnaise']}]},
      { id:'australien', namn:'Australien', blind:'images/kartor/australien-blind.svg',facit:'images/kartor/australien-facit.svg', quiz:[{q:'Var ligger Barossa Valley?',correct:'South Australia',wrong:['Victoria','New South Wales','Western Australia']},{q:'Vilken region har terra rossa-jord?',correct:'Coonawarra',wrong:['Hunter Valley','Yarra Valley','Margaret River']}]},
      { id:'nya-zeeland', namn:'Nya Zeeland', blind:'images/kartor/nya-zeeland-blind.svg',facit:'images/kartor/nya-zeeland-facit.svg', quiz:[{q:'Var produceras mest Sauvignon Blanc?',correct:'Marlborough',wrong:['Central Otago','Hawke\'s Bay','Nelson']},{q:'Vilken region har kontinentalt klimat?',correct:'Central Otago',wrong:['Marlborough','Gisborne','Auckland']}]},
      { id:'nordamerika', namn:'Nordamerika', blind:'images/kartor/nordamerika-blind.svg',facit:'images/kartor/nordamerika-facit.svg', quiz:[{q:'Var ligger Napa Valley?',correct:'Kalifornien',wrong:['Oregon','Washington','New York']},{q:'Vilken delstat är känd för Pinot Noir?',correct:'Oregon',wrong:['Texas','Virginia','Kalifornien']}]},
      { id:'sydamerika', namn:'Sydamerika', blind:'images/kartor/sydamerika-blind.svg',facit:'images/kartor/sydamerika-facit.svg', quiz:[{q:'Var ligger Mendoza?',correct:'Argentina',wrong:['Chile','Uruguay','Brasilien']},{q:'Vilket land är känt för Carmenère?',correct:'Chile',wrong:['Argentina','Uruguay','Peru']}]},
      { id:'sydafrika', namn:'Sydafrika', blind:'images/kartor/sydafrika-blind.svg',facit:'images/kartor/sydafrika-facit.svg', quiz:[{q:'Var ligger Stellenbosch?',correct:'Coastal Region',wrong:['Breede River','Klein Karoo','Olifants River']},{q:'Vilken region är känd för naturvin?',correct:'Swartland',wrong:['Constantia','Franschhoek','Paarl']}]},
      { id:'ostra-europa', namn:'Östra Europa', blind:'images/kartor/ostra-europa-blind.svg',facit:'images/kartor/ostra-europa-facit.svg', quiz:[{q:'Var produceras Tokaj Aszú?',correct:'Ungern',wrong:['Kroatien','Grekland','Slovenien']},{q:'Vilket land har Santorini?',correct:'Grekland',wrong:['Kroatien','Turkiet','Cypern']}]},
      { id:'ovriga-varlden', namn:'Övriga världen', blind:'images/kartor/ovriga-varlden-blind.svg',facit:'images/kartor/ovriga-varlden-facit.svg', quiz:[{q:'Vilket land anses vara vinets vagga?',correct:'Georgien',wrong:['Libanon','Armenien','Turkiet']}]}
    ];
    let currentMap=0, quizIdx=0, score={correct:0,total:0}, answered=false;
    function init(){const tabs=document.getElementById('tabs');maps.forEach((m,i)=>{const btn=document.createElement('button');btn.className='tab-btn'+(i===0?' active':'');btn.textContent=m.namn;btn.onclick=()=>selectMap(i);tabs.appendChild(btn)});renderMap(0)}
    function selectMap(i){currentMap=i;quizIdx=0;score={correct:0,total:0};answered=false;document.querySelectorAll('.tab-btn').forEach((b,j)=>b.classList.toggle('active',j===i));renderMap(i)}
    let showingFacit=false;
    function renderMap(i){const m=maps[i],c=document.getElementById('mapContainer');showingFacit=false;c.innerHTML=`<div class="map-card"><h2>${m.namn}</h2><p class="map-sub">Identifiera vinregionerna — numren på kartan motsvarar legenden</p><img class="map-img" id="mapImg" src="${m.blind}" alt="${m.namn} blindkarta"><div class="map-toggle"><button class="toggle-btn blind active" id="btnBlind" onclick="showBlind()">Blindkarta</button><button class="toggle-btn facit" id="btnFacit" onclick="showFacitMap()">Visa facit</button></div></div>${m.quiz.length?`<div class="map-card"><div class="quiz-section"><h3>Testa dig själv</h3><div class="quiz-score"><div><div class="score-num" id="sc">0</div><div class="score-label">Rätt</div></div><div><div class="score-num" id="st">0</div><div class="score-label">Frågor</div></div></div><div id="quizArea"></div></div></div>`:''}`; if(m.quiz.length)renderQuiz()}
    function showBlind(){document.getElementById('mapImg').src=maps[currentMap].blind;document.getElementById('btnBlind').classList.add('active');document.getElementById('btnFacit').classList.remove('active');showingFacit=false}
    function showFacitMap(){document.getElementById('mapImg').src=maps[currentMap].facit;document.getElementById('btnFacit').classList.add('active');document.getElementById('btnBlind').classList.remove('active');showingFacit=true}
    function renderQuiz(){const m=maps[currentMap];if(quizIdx>=m.quiz.length){document.getElementById('quizArea').innerHTML=`<div class="quiz-q">Klart! ${score.correct} av ${score.total} rätt</div><button class="quiz-next-btn show" onclick="resetQuiz()">Kör igen</button>`;return}const q=m.quiz[quizIdx];answered=false;const opts=[q.correct,...q.wrong].sort(()=>Math.random()-0.5);document.getElementById('quizArea').innerHTML=`<div class="quiz-q">${q.q}</div><div class="quiz-opts">${opts.map(o=>`<button class="quiz-opt" onclick="answerQ(this,'${o.replace(/'/g,"\\'")}','${q.correct.replace(/'/g,"\\'")}')">${o}</button>`).join('')}</div><div class="quiz-feedback" id="qfb"></div><button class="quiz-next-btn" id="qnext" onclick="nextQ()">Nästa →</button>`}
    function answerQ(btn,sel,cor){if(answered)return;answered=true;score.total++;document.querySelectorAll('.quiz-opt').forEach(b=>{b.disabled=true;if(b.textContent===cor)b.classList.add('correct')});if(sel===cor){score.correct++;document.getElementById('qfb').textContent='✓ Rätt!'}else{btn.classList.add('wrong');document.getElementById('qfb').textContent='✗ Rätt svar: '+cor}document.getElementById('sc').textContent=score.correct;document.getElementById('st').textContent=score.total;document.getElementById('qnext').classList.add('show')}
    function nextQ(){quizIdx++;renderQuiz()}
    function resetQuiz(){quizIdx=0;score={correct:0,total:0};renderQuiz();document.getElementById('sc').textContent='0';document.getElementById('st').textContent='0'}
    init();
  </script>
</body>
</html>
