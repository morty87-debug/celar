<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Celar — Mat & Vin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/druvor.css">
  <style>
    .matvin-input-area {
      max-width: 560px;
      margin: 2rem auto;
      padding: 0 1.5rem;
      position: relative;
      z-index: 1;
    }
    .matvin-textarea {
      font-family: var(--font-body);
      font-size: 0.95rem;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 1rem;
      width: 100%;
      min-height: 80px;
      resize: vertical;
      outline: none;
      transition: border-color 0.3s;
    }
    .matvin-textarea:focus { border-color: var(--border-hover); }
    .matvin-textarea::placeholder { color: var(--text-dim); }
    .matvin-btn {
      display: block;
      width: 100%;
      margin-top: 0.75rem;
      padding: 0.75rem;
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      color: #fff;
      background: var(--wine);
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.3s;
    }
    .matvin-btn:hover { background: var(--wine-light); }
    .matvin-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .matvin-or {
      text-align: center;
      color: var(--text-dim);
      font-size: 0.8rem;
      margin: 1.5rem 0;
    }
    .matvin-results {
      max-width: 660px;
      margin: 0 auto;
      padding: 0 1.5rem 4rem;
      position: relative;
      z-index: 1;
    }
    .pairing-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1rem;
      animation: fadeUp 0.5s ease-out backwards;
    }
    .pairing-card h3 {
      font-family: var(--font-display);
      font-size: 1.3rem;
      font-weight: 500;
      color: var(--sand-light);
      margin-bottom: 0.5rem;
    }
    .pairing-card .pairing-why {
      font-size: 0.88rem;
      color: var(--text);
      line-height: 1.7;
      margin-bottom: 0.75rem;
    }
    .pairing-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
    }
    .pairing-tag {
      font-size: 0.7rem;
      font-weight: 500;
      padding: 0.2rem 0.6rem;
      border-radius: 100px;
      color: var(--moss);
      background: rgba(74, 90, 58, 0.08);
    }
    .browse-section {
      max-width: 660px;
      margin: 0 auto;
      padding: 0 1.5rem 2rem;
      position: relative;
      z-index: 1;
    }
    .browse-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 0.6rem;
    }
    .browse-card {
      padding: 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.3s;
      text-align: center;
    }
    .browse-card:hover {
      border-color: var(--border-hover);
      background: var(--surface-hover);
      transform: translateY(-2px);
    }
    .browse-emoji { font-size: 1.5rem; margin-bottom: 0.3rem; }
    .browse-label {
      font-family: var(--font-display);
      font-size: 0.95rem;
      color: var(--sand-light);
    }
  </style>
  <link rel="stylesheet" href="css/mobile.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6b1e2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
  <div class="bg-grain"></div>

  <header class="druvor-header">
    <a href="index.html" class="back-link">← Tillbaka</a>
    <h1 class="druvor-title">Mat & Vin</h1>
    <p class="druvor-subtitle">Skriv in en rätt — få vinförslag med motivering</p>
  </header>

  <div class="matvin-input-area">
    <textarea class="matvin-textarea" id="dishInput" placeholder="Beskriv din rätt... t.ex. 'grillad lammkarré med rosmarin och rotfrukter' eller 'sushi med lax och avokado'"></textarea>
    <button class="matvin-btn" id="pairBtn" onclick="getPairing()">Hitta vinmatchning</button>
  </div>

  <div class="matvin-or">— eller välj en kategori —</div>

  <div class="browse-section">
    <div class="browse-grid">
      <div class="browse-card" onclick="quickPair('Grillat rött kött')"><div class="browse-emoji">🥩</div><div class="browse-label">Grillat kött</div></div>
      <div class="browse-card" onclick="quickPair('Fet fisk med smörsås')"><div class="browse-emoji">🐟</div><div class="browse-label">Fet fisk</div></div>
      <div class="browse-card" onclick="quickPair('Skaldjur och ostron')"><div class="browse-emoji">🦐</div><div class="browse-label">Skaldjur</div></div>
      <div class="browse-card" onclick="quickPair('Pasta med tomatsås')"><div class="browse-emoji">🍝</div><div class="browse-label">Pasta</div></div>
      <div class="browse-card" onclick="quickPair('Kryddig asiatisk mat med chili')"><div class="browse-emoji">🌶️</div><div class="browse-label">Kryddigt</div></div>
      <div class="browse-card" onclick="quickPair('Ost och charkuterier')"><div class="browse-emoji">🧀</div><div class="browse-label">Ost & chark</div></div>
      <div class="browse-card" onclick="quickPair('Vegetarisk rätt med svamp och tryffel')"><div class="browse-emoji">🍄</div><div class="browse-label">Vegetariskt</div></div>
      <div class="browse-card" onclick="quickPair('Chokladdessert')"><div class="browse-emoji">🍫</div><div class="browse-label">Dessert</div></div>
    </div>
  </div>

  <div class="matvin-results" id="results"></div>

  <footer class="footer">
    <div class="footer-divider"><span class="divider-vine">✦</span></div>
    <p>Celar — Byggt för sommelierer</p>
  </footer>

  <script>
    const pairings = [
      { mat: ["grillat kött", "biff", "entrecôte", "ryggbiff", "oxfilé", "lamm", "grillat rött kött", "lammkarré"], vin: "Cabernet Sauvignon", regioner: ["Napa Valley", "Bordeaux (Médoc)", "Coonawarra"], motivering: "Cabernet Sauvignons kraftfulla tanniner och mörka frukt parar perfekt med grillat kötts röka och fett. Tanninerna mjukas av proteinet. Alternativ: Malbec (Argentina) för mer frukt, Syrah/Shiraz för kryddigare profil." },
      { mat: ["grillat kött", "biff", "lammkarré"], vin: "Barolo (Nebbiolo)", regioner: ["Piemonte"], motivering: "Barolos höga syra och tanniner klipper igenom fett och ger en elegant matchning. Rosdoft och tjära kompletterar grillsmaker. Kräver lagrat vin." },
      { mat: ["lamm", "lammkarré", "lammstek"], vin: "Syrah / Shiraz", regioner: ["Norra Rhône", "Barossa Valley", "Swartland"], motivering: "Syrahs peppriga kryddighet och mörka frukt är en klassisk partner till lamm. Kryddor i maten (rosmarin, timjan) speglar vinets kryddkaraktär." },
      { mat: ["fet fisk", "lax", "smörsås", "hummer"], vin: "Chardonnay (ekfatslagrad)", regioner: ["Bourgogne (Meursault)", "Napa Valley", "Margaret River"], motivering: "En fyllig Chardonnay med smör- och briochetoner matchar fiskens fett och smörsåsens textur. MLF ger mjukhet som harmoniserar. Undvik för lätta viner — kroppen måste matcha." },
      { mat: ["skaldjur", "ostron", "räkor", "musslor"], vin: "Champagne / Chablis", regioner: ["Champagne", "Chablis", "Muscadet"], motivering: "Champagnes kolsyra och mineralitet lyfter skaldjurens sälta. Chablis Kimmeridge-kalksten (fyllda med fossila ostron) skapar en geologisk koppling. Muscadet sur lie ger textur." },
      { mat: ["sushi", "rå fisk", "sashimi", "ceviche"], vin: "Fino Sherry / Albariño", regioner: ["Jerez", "Rías Baixas", "Sancerre"], motivering: "Fino Sherrys saltiga, nötiga profil under flor-jäst är perfekt till rå fisk och soja. Albariños salina mineralitet fungerar lika bra. Sauvignon Blanc från Sancerre med sin syra och gröna toner är ett utmärkt tredje val." },
      { mat: ["pasta", "tomatsås", "pizza", "lasagne"], vin: "Sangiovese (Chianti)", regioner: ["Chianti Classico", "Montepulciano d'Abruzzo", "Barbera d'Asti"], motivering: "Sangioveses höga syra matchar tomatens syra — de balanserar varandra istället för att krocka. Körsbärstoner och örter kompletterar basilika och oregano. Barbera fungerar lika bra tack vare sin friska syra." },
      { mat: ["kryddig mat", "thai", "indisk", "chili", "asiatisk", "wok"], vin: "Off-dry Riesling", regioner: ["Mosel (Kabinett/Spätlese)", "Alsace", "Clare Valley"], motivering: "Sötma och frukt i en off-dry Riesling motverkar chili-hetta — det bästa motgiftet. Hög syra håller vinet balanserat. Undvik tanninrika viner — tanniner förstärker hetta." },
      { mat: ["ost", "charkuterier", "antipasti"], vin: "Garnacha / Grenache", regioner: ["Priorat", "Châteauneuf-du-Pape", "Södra Rhône"], motivering: "Garnachas generösa frukt och mjuka tanniner parar bra med feta ostar och saltiga charkuterier. Alternativ: Beaujolais (Gamay) för lättare ost, Aged Tawny Port för hårdare ostar." },
      { mat: ["vegetarisk", "svamp", "tryffel", "jordiga smaker"], vin: "Pinot Noir", regioner: ["Bourgogne", "Oregon (Willamette)", "Central Otago"], motivering: "Pinot Noirs jordiga undertoner och silkiga textur är den klassiska matchningen till svamp och tryffel. Vinets elegans överväldigar inte — det kompletterar." },
      { mat: ["dessert", "choklad", "chokladdessert", "brownie"], vin: "Recioto della Valpolicella / Banyuls", regioner: ["Veneto", "Roussillon", "Douro (Ruby Port)"], motivering: "Grundregeln: vinet måste vara lika sött eller sötare än desserten. Reciotos mörka frukt och sötma matchar choklad perfekt. Port fungerar utmärkt. Undvik torra viner — de smakar sura mot söt mat." },
      { mat: ["blåmögelost", "roquefort", "stilton"], vin: "Sauternes / PX Sherry", regioner: ["Sauternes", "Jerez", "Tokaj"], motivering: "Salt + sött = magi. Sauternes honungstoner och höga syra balanserar ostens intensiva sälta och umami. Pedro Ximénez med sina russin- och chokladtoner är ett kraftfullare alternativ." },
      { mat: ["syrlig sallad", "vinägrett", "getost"], vin: "Sauvignon Blanc", regioner: ["Sancerre", "Marlborough", "Casablanca"], motivering: "Sauvignon Blancs höga syra matchar vinägretten — matens syra bör aldrig överstiga vinets. Gräsiga, citrusiga toner kompletterar sallad och getost." },
      { mat: ["bbq", "grillad", "glaserat kött", "spareribs"], vin: "Zinfandel / Malbec", regioner: ["Lodi", "Paso Robles", "Mendoza"], motivering: "Zinfandels mogna, kryddiga frukt och höga alkohol matchar BBQ-glasyrens sötma och rökighet. Malbec med sin intensiva mörka frukt och mjuka tanniner fungerar lika bra." },
      { mat: ["fågel", "kyckling", "kalkon", "anka"], vin: "Chardonnay / Pinot Noir", regioner: ["Bourgogne", "Sonoma", "Martinborough"], motivering: "Fågel är flexibelt — stekt kyckling med Chardonnay, grillad anka med Pinot Noir. Nyckeln är tillagningen: krämig sås → vitt, grillad/stekt → rött. Amontillado Sherry fungerar utmärkt till kyckling." }
    ];

    function getPairing() {
      const input = document.getElementById('dishInput').value.trim();
      if (!input) return;
      showResults(input);
    }

    function quickPair(dish) {
      document.getElementById('dishInput').value = dish;
      showResults(dish);
    }

    function showResults(dish) {
      const results = document.getElementById('results');
      const q = dish.toLowerCase();
      const matches = pairings.filter(p =>
        p.mat.some(m => q.includes(m) || m.includes(q.split(' ')[0]))
      );

      if (matches.length === 0) {
        const allWords = q.split(/\s+/);
        const fuzzy = pairings.filter(p =>
          p.mat.some(m => allWords.some(w => w.length > 3 && m.includes(w)))
        );
        if (fuzzy.length > 0) {
          renderResults(dish, fuzzy);
        } else {
          results.innerHTML = `
            <div class="pairing-card">
              <h3>Inga exakta matchningar</h3>
              <p class="pairing-why">Prova att beskriva rätten annorlunda, eller välj en kategori ovan. Grundregel: matcha kroppens intensitet — lätt mat med lätt vin, kraftig mat med kraftigt vin.</p>
            </div>
          `;
        }
        return;
      }
      renderResults(dish, matches);
    }

    function renderResults(dish, matches) {
      const results = document.getElementById('results');
      results.innerHTML = `<div class="continent-header" style="margin-top:0">
        <span class="continent-line"></span>
        <span class="continent-name">Förslag till "${dish}"</span>
        <span class="continent-line"></span>
      </div>`;

      matches.forEach((m, i) => {
        results.innerHTML += `
          <div class="pairing-card" style="animation-delay:${i * 0.1}s">
            <h3>${m.vin}</h3>
            <p class="pairing-why">${m.motivering}</p>
            <div class="pairing-tags">
              ${m.regioner.map(r => `<span class="pairing-tag">${r}</span>`).join('')}
            </div>
          </div>
        `;
      });

      results.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  </script>
  <script src="js/mobile-nav.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
