<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Celar — Framsteg</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .framsteg-header {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 3rem 1.5rem 1.5rem;
      animation: fadeUp 0.8s ease-out;
    }
    .framsteg-header .back-link {
      position: absolute;
      top: 2rem;
      left: 1.5rem;
      font-family: var(--font-body);
      font-size: 0.85rem;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.3s;
    }
    .framsteg-header .back-link:hover { color: var(--wine); }
    .framsteg-header h1 {
      font-family: var(--font-display);
      font-size: clamp(2.5rem, 6vw, 3.5rem);
      font-weight: 300;
      color: var(--sand-light);
      letter-spacing: 0.1em;
    }
    .framsteg-header p {
      color: var(--text-muted);
      margin-top: 0.5rem;
      font-size: 0.9rem;
    }

    .dashboard {
      position: relative;
      z-index: 1;
      max-width: 780px;
      margin: 2rem auto;
      padding: 0 1.5rem 4rem;
    }

    /* Stats row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 0.8rem;
      margin-bottom: 2rem;
      animation: fadeUp 0.5s ease-out 0.1s backwards;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 1.25rem 1rem;
      text-align: center;
    }
    .stat-num {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 400;
      color: var(--wine);
      line-height: 1;
    }
    .stat-label {
      font-size: 0.72rem;
      color: var(--text-dim);
      margin-top: 0.35rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* Overall progress */
    .progress-section {
      margin-bottom: 2rem;
      animation: fadeUp 0.5s ease-out 0.2s backwards;
    }
    .progress-section h2 {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--sand-light);
      margin-bottom: 0.75rem;
    }
    .progress-bar-wrap {
      background: rgba(0,0,0,0.04);
      border-radius: 100px;
      height: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .progress-bar-fill {
      height: 100%;
      border-radius: 100px;
      background: linear-gradient(90deg, var(--wine), var(--wine-light));
      transition: width 0.8s ease;
    }
    .progress-text {
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-top: 0.4rem;
      text-align: right;
    }

    /* Lesson grid */
    .lessons-section {
      margin-bottom: 2rem;
      animation: fadeUp 0.5s ease-out 0.3s backwards;
    }
    .lessons-section h2 {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--sand-light);
      margin-bottom: 0.75rem;
    }
    .lesson-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 0.5rem;
    }
    .lesson-cell {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.75rem 0.5rem;
      text-align: center;
      text-decoration: none;
      color: var(--text);
      transition: all 0.3s;
    }
    .lesson-cell:hover {
      border-color: var(--border-hover);
      transform: translateY(-2px);
    }
    .lesson-cell.visited {
      border-color: rgba(74, 90, 58, 0.3);
      background: rgba(74, 90, 58, 0.06);
    }
    .lesson-cell.visited .lesson-cell-icon {
      color: var(--moss);
    }
    .lesson-cell-num {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 500;
      color: var(--sand-light);
    }
    .lesson-cell-icon {
      font-size: 0.7rem;
      margin-top: 0.2rem;
      color: var(--text-dim);
    }
    .lesson-cell-title {
      font-size: 0.62rem;
      color: var(--text-dim);
      margin-top: 0.2rem;
      line-height: 1.3;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Quiz history */
    .quiz-section {
      margin-bottom: 2rem;
      animation: fadeUp 0.5s ease-out 0.4s backwards;
    }
    .quiz-section h2 {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--sand-light);
      margin-bottom: 0.75rem;
    }
    .quiz-history-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .quiz-history-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }
    .quiz-history-score {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 500;
      color: var(--wine);
      min-width: 3.5rem;
      text-align: center;
    }
    .quiz-history-info {
      flex: 1;
    }
    .quiz-history-mode {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--sand-light);
    }
    .quiz-history-date {
      font-size: 0.72rem;
      color: var(--text-dim);
    }
    .quiz-history-bar {
      width: 80px;
      height: 6px;
      background: rgba(0,0,0,0.04);
      border-radius: 100px;
      overflow: hidden;
    }
    .quiz-history-bar-fill {
      height: 100%;
      border-radius: 100px;
      background: var(--wine);
    }

    .empty-msg {
      font-size: 0.85rem;
      color: var(--text-dim);
      font-style: italic;
      padding: 1rem 0;
    }

    /* Study time */
    .time-estimate {
      font-size: 0.82rem;
      color: var(--text-dim);
      margin-top: 0.5rem;
    }

    @media (max-width: 480px) {
      .lesson-grid { grid-template-columns: repeat(4, 1fr); }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
  <link rel="stylesheet" href="css/mobile.css">
</head>
<body>
  <div class="bg-grain"></div>

  <header class="framsteg-header">
    <a href="index.html" class="back-link">&larr; Tillbaka</a>
    <h1>Framsteg</h1>
    <p>Din studieresa genom sommelierkursen</p>
  </header>

  <main class="dashboard">
    <!-- Stats -->
    <div class="stats-row" id="statsRow"></div>

    <!-- Overall progress -->
    <div class="progress-section">
      <h2>Kursframsteg</h2>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progressFill" style="width: 0%"></div>
      </div>
      <div class="progress-text" id="progressText">0 / 19 lektioner</div>
      <div class="time-estimate" id="timeEstimate"></div>
    </div>

    <!-- Lesson grid -->
    <div class="lessons-section">
      <h2>Lektioner</h2>
      <div class="lesson-grid" id="lessonGrid"></div>
    </div>

    <!-- Quiz history -->
    <div class="quiz-section">
      <h2>Quizhistorik</h2>
      <div class="quiz-history-list" id="quizHistory"></div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-divider"><span class="divider-vine">&#10038;</span></div>
    <p>Celar &mdash; Byggt f&ouml;r sommelierer</p>
  </footer>

  <script>
    const TOTAL_LESSONS = 19;
    const MINUTES_PER_LESSON = 25;

    const lessonTitles = {
      1: 'Introduktion', 2: 'Frankrike', 3: 'Italien', 4: 'Spanien',
      5: 'Mat & dryck', 6: 'Bordeaux & Bourgogne', 7: 'Portugal',
      8: 'Tyskland m.fl.', 9: 'Sommelierteori', 10: 'Mousserande',
      11: 'Öl & cider', 12: 'Östra Europa', 13: 'Söta viner',
      14: 'Sprit', 15: 'Nordamerika', 16: 'Sydamerika',
      17: 'Oceanien', 18: 'Sydafrika & Asien', 19: 'Praktisk kunskap'
    };

    const modeNames = {
      druvor: 'Druvor', regioner: 'Regioner', fakta: 'Fakta',
      parning: 'Mat & Vin', provning: 'Provning', blandad: 'Blandad'
    };

    function getProgress() {
      try { return JSON.parse(localStorage.getItem('celar-progress')) || {}; } catch { return {}; }
    }

    function getQuizHistory() {
      try { return JSON.parse(localStorage.getItem('celar-quiz-history')) || []; } catch { return []; }
    }

    function render() {
      const progress = getProgress();
      const quizHistory = getQuizHistory();
      const visitedCount = Object.keys(progress).length;
      const quizCount = quizHistory.length;
      const avgScore = quizCount > 0
        ? Math.round(quizHistory.reduce((sum, q) => sum + (q.score / q.total) * 100, 0) / quizCount)
        : 0;
      const pct = Math.round((visitedCount / TOTAL_LESSONS) * 100);
      const studyMinutes = visitedCount * MINUTES_PER_LESSON;

      // Stats
      document.getElementById('statsRow').innerHTML = `
        <div class="stat-card"><div class="stat-num">${visitedCount}</div><div class="stat-label">Lektioner besökta</div></div>
        <div class="stat-card"><div class="stat-num">${quizCount}</div><div class="stat-label">Quiz genomförda</div></div>
        <div class="stat-card"><div class="stat-num">${avgScore}%</div><div class="stat-label">Snittresultat</div></div>
        <div class="stat-card"><div class="stat-num">${pct}%</div><div class="stat-label">Slutfört</div></div>
      `;

      // Progress bar
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('progressText').textContent = `${visitedCount} / ${TOTAL_LESSONS} lektioner`;

      // Time estimate
      const hours = Math.floor(studyMinutes / 60);
      const mins = studyMinutes % 60;
      document.getElementById('timeEstimate').textContent = studyMinutes > 0
        ? `Uppskattad studietid: ${hours > 0 ? hours + ' tim ' : ''}${mins > 0 ? mins + ' min' : ''}`
        : '';

      // Lesson grid
      const grid = document.getElementById('lessonGrid');
      grid.innerHTML = '';
      for (let i = 1; i <= TOTAL_LESSONS; i++) {
        const visited = !!progress[i];
        const cell = document.createElement('a');
        cell.href = `lektion.html?id=${i}`;
        cell.className = `lesson-cell${visited ? ' visited' : ''}`;
        cell.innerHTML = `
          <div class="lesson-cell-num">${i}</div>
          <div class="lesson-cell-icon">${visited ? '&#10003;' : '&#9711;'}</div>
          <div class="lesson-cell-title">${lessonTitles[i]}</div>
        `;
        grid.appendChild(cell);
      }

      // Quiz history
      const histEl = document.getElementById('quizHistory');
      if (quizHistory.length === 0) {
        histEl.innerHTML = '<p class="empty-msg">Inga quiz genomförda ännu. Testa dina kunskaper!</p>';
      } else {
        const recent = quizHistory.slice(-10).reverse();
        histEl.innerHTML = recent.map(q => {
          const scorePct = Math.round((q.score / q.total) * 100);
          const date = new Date(q.timestamp);
          const dateStr = date.toLocaleDateString('sv-SE', { day: 'numeric', month: 'short' });
          return `
            <div class="quiz-history-item">
              <div class="quiz-history-score">${scorePct}%</div>
              <div class="quiz-history-info">
                <div class="quiz-history-mode">${modeNames[q.mode] || q.mode}</div>
                <div class="quiz-history-date">${dateStr} &mdash; ${q.score}/${q.total} rätt</div>
              </div>
              <div class="quiz-history-bar"><div class="quiz-history-bar-fill" style="width:${scorePct}%"></div></div>
            </div>
          `;
        }).join('');
      }
    }

    render();
  </script>
  <script src="js/mobile-nav.js"></script>
</body>
</html>
